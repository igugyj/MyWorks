works:
  - title: "Pelr"
    description: "以实用为导向的 Windows 桌面宠物"
    detail: "基于 C++ 和 Qt6 的 Live2D 桌面宠物应用。集成 AI 对话、语音合成（Edge TTS / 讯飞 / VOICEVOX）、天气信息、TODO 管理、快捷启动、键盘状态监控、音乐托盘等多种实用功能。使用 OpenGL 渲染 Live2D 模型，支持自定义表情动作。MIT 协议开源。"
    tags: ["C++", "Qt6", "OpenGL", "Live2D"]
    image: "assets/images/projects/Pelr/image.png"
    links:
      - label: "GitHub"
        url: "https://github.com/igugyj/Pelr"

